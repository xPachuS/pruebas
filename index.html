<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Contrato D/s</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1 id="ui-title">Contrato D/s</h1>
    <p id="ui-subtitle" class="subtitle">Genera tu contrato personalizado en PDF</p>

    <br>

    <form id="contractForm">
      
      <div class="form-group">
        <select id="language" required>
          <option value="es" selected>Español</option>
          <option value="en">English</option>
          <option value="de">Deutsch</option>
          <option value="it">Italiano</option>
          <option value="ro">Română</option>
        </select>
        <label for="language" id="ui-lbl-lang">Idioma / Language</label>
      </div>
      
      <div class="form-row">
        <div class="form-group role-group">
          <select id="domGender" required>
            <option value="" disabled selected hidden></option>
            <option value="Ama">Ama</option>
            <option value="Amo">Amo</option>
          </select>
          <label for="domGender" id="ui-lbl-domRole">Rol Dominante</label>
        </div>
        <div class="form-group name-group">
          <input type="text" id="domme" placeholder=" " required>
          <label for="domme" id="ui-lbl-domName">Nombre Dominante</label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group role-group">
          <select id="subGender" required>
            <option value="" disabled selected hidden></option>
            <option value="Sumisa">Sumisa</option>
            <option value="Sumiso">Sumiso</option>
          </select>
          <label for="subGender" id="ui-lbl-subRole">Rol Sumiso/a</label>
        </div>
        <div class="form-group name-group">
          <input type="text" id="sub" placeholder=" " required>
          <label for="sub" id="ui-lbl-subName">Nombre Sumiso/a</label>
        </div>
      </div>

      <div class="form-group">
        <input type="text" id="safeword" placeholder=" " required>
        <label for="safeword" id="ui-lbl-safe">Palabra de seguridad</label>
      </div>

      <div class="form-group">
        <textarea id="consented" placeholder=" " required></textarea>
        <label for="consented" id="ui-lbl-con">Prácticas consentidas (separadas por saltos de línea)</label>
      </div>

      <div class="form-group">
        <textarea id="nonconsented" placeholder=" " required></textarea>
        <label for="nonconsented" id="ui-lbl-non">Prácticas no consentidas (Límites Duros)</label>
      </div>

      <div class="form-group">
        <input type="text" id="duration" placeholder=" " required>
        <label for="duration" id="ui-lbl-dur">Duración del contrato (ej: 6 meses)</label>
      </div>

      <br>

      <button type="submit" id="ui-btn-submit">Generar PDF</button>
    </form>
  </div>

  <script src="contrato.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
