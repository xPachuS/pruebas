<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Contrato D/s</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Contrato D/s</h1>
    <p class="subtitle">Rellena los campos y genera tu PDF</p>

    <form id="contractForm">
      <div class="form-group">
        <input type="text" id="sub" placeholder="Nombre del sumiso" required>
        <label for="sub">Nombre del sumiso</label>
      </div>

      <div class="form-group">
        <input type="text" id="domme" placeholder="Nombre del Ama/Amo" required>
        <label for="domme">Nombre del Ama/Amo</label>
      </div>

      <div class="form-group">
        <input type="text" id="safeword" placeholder="Palabra de seguridad" required>
        <label for="safeword">Palabra de seguridad</label>
      </div>

      <div class="form-group">
        <input type="text" id="duration" placeholder="Duración del contrato" required>
        <label for="duration">Duración del contrato</label>
      </div>

      <div class="form-group">
        <textarea id="consented" placeholder="Prácticas consentidas" required></textarea>
        <label for="consented">Prácticas consentidas</label>
      </div>

      <div class="form-group">
        <textarea id="nonconsented" placeholder="Prácticas no consentidas" required></textarea>
        <label for="nonconsented">Prácticas no consentidas</label>
      </div>

      <button type="submit">Generar PDF</button>
    </form>
  </div>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Contrato -->
  <script src="contrato.js"></script>

  <!-- Script del PDF -->
  <script src="script.js"></script>
</body>
</html>
