<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Contrato D/s</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <button id="theme-toggle" type="button" aria-label="Cambiar tema">🌙</button>

    <h1 id="ui-title">Contrato D/s</h1>
    <p id="ui-subtitle" class="subtitle">Genera tu contrato personalizado en PDF</p>

    <br>

    <form id="contractForm">
      
      <div class="form-group custom-select-wrapper">
        <input type="text" id="lang-display" class="custom-select-trigger" readonly placeholder=" " required value="Español">
        <label for="lang-display" id="ui-lbl-lang">Idioma / Language</label>
        <input type="hidden" id="language" value="es">
        <span class="custom-arrow"></span>
        <div class="custom-options">
          <div class="custom-option selected" data-value="es">Español</div>
          <div class="custom-option" data-value="en">English</div>
          <div class="custom-option" data-value="de">Deutsch</div>
          <div class="custom-option" data-value="it">Italiano</div>
          <div class="custom-option" data-value="ro">Română</div>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group role-group custom-select-wrapper">
          <input type="text" id="domGender-display" class="custom-select-trigger" readonly placeholder=" " required value="">
          <label for="domGender-display" id="ui-lbl-domRole">Rol Dominante</label>
          <input type="hidden" id="domGender" value="">
          <span class="custom-arrow"></span>
          <div class="custom-options">
            <div class="custom-option" data-value="Ama" id="opt-dom-fem">Ama</div>
            <div class="custom-option" data-value="Amo" id="opt-dom-male">Amo</div>
          </div>
        </div>
        <div class="form-group name-group">
          <input type="text" id="domme" placeholder=" " required>
          <label for="domme" id="ui-lbl-domName">Nombre Dominante</label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group role-group custom-select-wrapper">
          <input type="text" id="subGender-display" class="custom-select-trigger" readonly placeholder=" " required value="">
          <label for="subGender-display" id="ui-lbl-subRole">Rol Sumiso/a</label>
          <input type="hidden" id="subGender" value="">
          <span class="custom-arrow"></span>
          <div class="custom-options">
            <div class="custom-option" data-value="Sumisa" id="opt-sub-fem">Sumisa</div>
            <div class="custom-option" data-value="Sumiso" id="opt-sub-male">Sumiso</div>
          </div>
        </div>
        <div class="form-group name-group">
          <input type="text" id="sub" placeholder=" " required>
          <label for="sub" id="ui-lbl-subName">Nombre Sumiso/a</label>
        </div>
      </div>

      <div class="form-group">
        <input type="text" id="safeword" placeholder=" " required>
        <label for="safeword" id="ui-lbl-safe">Palabra de seguridad</label>
      </div>

      <div class="form-group">
        <textarea id="consented" placeholder=" " required></textarea>
        <label for="consented" id="ui-lbl-con">Prácticas consentidas (separadas por saltos de línea)</label>
      </div>

      <div class="form-group">
        <textarea id="nonconsented" placeholder=" " required></textarea>
        <label for="nonconsented" id="ui-lbl-non">Prácticas no consentidas (Límites Duros)</label>
      </div>

      <div class="form-group">
        <input type="text" id="duration" placeholder=" " required>
        <label for="duration" id="ui-lbl-dur">Duración del contrato (ej: 6 meses)</label>
      </div>

      <div class="form-group custom-select-wrapper">
        <input type="text" id="exclusivity-display" class="custom-select-trigger" readonly placeholder=" " required value="Exclusividad Total">
        <label for="exclusivity-display" id="ui-lbl-excl">Reglas de Exclusividad</label>
        <input type="hidden" id="exclusivity" value="total">
        <span class="custom-arrow"></span>
        <div class="custom-options">
          <div class="custom-option" data-value="total" id="opt-excl-total">Exclusividad Total</div>
          <div class="custom-option" data-value="open" id="opt-excl-open">Dinámica Abierta</div>
        </div>
      </div>

      <div class="form-group">
        <textarea id="dailyTasks" placeholder=" "></textarea>
        <label for="dailyTasks" id="ui-lbl-tasks">Tareas Diarias / Rituales (Opcional)</label>
      </div>

      <br>

      <button type="submit" id="ui-btn-submit">Generar PDF</button>
    </form>
  </div>

  <script src="contrato.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <script src="ui.js"></script>
  <script src="pdf-generator.js"></script>
  <script src="script.js"></script>

</body>
</html>
